name: CI

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main, work]

# ── jobs ───────────────────────────────────────────────────────────────────
#
#  1. lint        — ruff check on api/  (always runs, no weights needed)
#  2. test        — live uvicorn + test_api.py  (soft-skip if no weights)
#  3. docker-build — build image + verify /health  (soft-skip if no weights)
#
# Model weights (models/resnet50_best.pth) are excluded from git.
# Jobs 2 and 3 will print a clear skip message and pass when weights are absent.
# To enable full CI: upload resnet50_best.pth via GitHub Actions cache,
# artifacts, or Git LFS, then re-run.
# ──────────────────────────────────────────────────────────────────────────

jobs:

  # ── job 1: lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Check api/
        run: ruff check api/

  # ── job 2: API test ───────────────────────────────────────────────────────
  test:
    name: API Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # Check whether model weights are available
      - name: Check model weights
        id: weights
        run: |
          if [ -f "models/resnet50_best.pth" ]; then
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "Model weights found — running API tests."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Model weights not found — API test skipped."
            echo "To enable: commit resnet50_best.pth (e.g. via Git LFS) or"
            echo "           download it in a prior workflow step."
          fi

      - uses: actions/setup-python@v5
        if: steps.weights.outputs.available == 'true'
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.weights.outputs.available == 'true'
        run: pip install -r requirements_api.txt

      # NOTE: api/test_leaf.jpg must be committed to the repo for this step.
      #       It is a 659 KB JPEG — safe to commit alongside the test script.
      - name: Start uvicorn in background
        if: steps.weights.outputs.available == 'true'
        run: |
          python -m uvicorn api.app:app --host 127.0.0.1 --port 8000 &
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 2
          done

      - name: Run API tests
        if: steps.weights.outputs.available == 'true'
        run: python api/test_api.py

  # ── job 3: Docker build ───────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # Check whether model weights are available
      # (Dockerfile COPYs resnet50_best.pth — build fails without it)
      - name: Check model weights
        id: weights
        run: |
          if [ -f "models/resnet50_best.pth" ]; then
            echo "available=true"  >> "$GITHUB_OUTPUT"
            echo "Model weights found — running Docker build."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Model weights not found — Docker build skipped."
          fi

      - name: Build Docker image
        if: steps.weights.outputs.available == 'true'
        run: docker build -t plant-disease-classifier .

      - name: Start container
        if: steps.weights.outputs.available == 'true'
        run: docker run -d -p 8000:8000 --name plant-api plant-disease-classifier

      - name: Wait for container health
        if: steps.weights.outputs.available == 'true'
        run: |
          echo "Waiting for container to be healthy..."
          for i in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Container healthy after $((i * 3))s"
              break
            fi
            sleep 3
          done
          curl -sf http://127.0.0.1:8000/health

      - name: Stop and remove container
        if: steps.weights.outputs.available == 'true' && always()
        run: |
          docker stop plant-api || true
          docker rm   plant-api || true
